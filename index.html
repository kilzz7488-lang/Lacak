<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Info & Lokasi Real by wates</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; /* Mencegah scroll saat modal muncul */
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h2 { color: #333; margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        /* Button Utama */
        button.action-btn {
            width: 100%;
            padding: 12px;
            background-color: #d9534f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button.action-btn:hover { background-color: #c9302c; }

        #result {
            margin-top: 20px;
            text-align: left;
            display: none;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }

        .info-item { margin-bottom: 10px; font-size: 14px; }
        .label { font-weight: bold; color: #555; }

        #map {
            height: 250px;
            width: 100%;
            margin-top: 15px;
            border-radius: 8px;
            border: 2px solid #d9534f;
            display: none;
        }

        /* --- STYLE UNTUK MODAL NOTIFIKASI --- */
        #notifOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85); /* Latar belakang gelap */
            z-index: 9999; /* Pastikan di paling atas */
            display: flex; /* Flex agar box di tengah */
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .notif-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: popUp 0.4s ease-out;
        }

        .notif-box p {
            font-size: 16px;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.5;
            font-weight: 500;
        }

        /* Tombol Follow WhatsApp */
        .btn-follow {
            background-color: #25D366; /* Warna Hijau WA */
            color: white;
            font-weight: bold;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none; /* Hilangkan garis bawah link */
        }

        .btn-follow:hover {
            background-color: #128C7E;
            transform: scale(1.05);
        }

        @keyframes popUp {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

    </style>
</head>
<body>

    <div id="notifOverlay">
        <div class="notif-box">
            <p>join my saluran dulu biar bisa</p>
            <a href="https://whatsapp.com/channel/0029VbCfHjTGehEUM0Bljc1o" target="_blank" class="btn-ikuti" onclick="closeNotif()">
                ikuti
            </a>
        </div>
    </div>

    <div class="container">
        <h2>Wates Tracker</h2>
        <p style="font-size: 14px; color: #666;">Masukkan nomor wa target</p>
        
        <input type="number" id="inputWa" placeholder="Contoh: 0812xxxx" required>
        
        <button class="action-btn" onclick="cekInfo()">Lacak Lokasi dan ip</button>

        <div id="result">
            <div class="info-item"><span class="label">wa target:</span> <span id="wa-display">-</span></div>
            <div class="info-item"><span class="label">IP Address:</span> <span id="ip-display">Loading...</span></div>
            <div class="info-item"><span class="label">Koordinat :</span> <span id="loc-display">Menyiapkan data...</span></div>
            
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- LOGIC NOTIFIKASI 1X ---
        // Cek saat halaman dimuat
        document.addEventListener("DOMContentLoaded", function() {
            // Cek apakah user sudah pernah klik follow sebelumnya di browser ini
            if (localStorage.getItem("sudah_follow_rasya") === "true") {
                // Jika sudah, sembunyikan overlay langsung
                document.getElementById("notifOverlay").style.display = "none";
                document.body.style.overflow = "auto"; // Kembalikan scroll
            }
        });

        // Fungsi saat tombol FOLLOW diklik
        function closeNotif() {
            // 1. Simpan status ke memori browser (localStorage)
            localStorage.setItem("sudah_follow_rasya", "true");
            
            // 2. Beri jeda sedikit biar user melihat kliknya, lalu tutup overlay
            setTimeout(() => {
                document.getElementById("notifOverlay").style.display = "none";
                document.body.style.overflow = "auto";
            }, 500); // Overlay hilang setengah detik setelah klik (tab baru WA akan terbuka)
        }
        
        // --- LOGIC UTAMA (MAPS & IP) ---

        function getRandomInRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        async function cekInfo() {
            const noWa = document.getElementById('inputWa').value;
            const resultDiv = document.getElementById('result');
            const waDisplay = document.getElementById('wa-display');
            const ipDisplay = document.getElementById('ip-display');
            const locDisplay = document.getElementById('loc-display');
            const mapDiv = document.getElementById('map');

            if (!noWa) {
                alert("Masukkan nomor WA dulu!");
                return;
            }

            resultDiv.style.display = 'block';
            waDisplay.innerText = noWa;

            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                ipDisplay.innerText = data.ip;
            } catch (error) {
                ipDisplay.innerText = "Gagal mengambil IP";
            }

            // Batas koordinat Bandung
            const bounds = {
                minLat: -6.9600, 
                maxLat: -6.8700, 
                minLng: 107.5600, 
                maxLng: 107.6800  
            };

            const randomLat = getRandomInRange(bounds.minLat, bounds.maxLat).toFixed(6);
            const randomLng = getRandomInRange(bounds.minLng, bounds.maxLng).toFixed(6);

            locDisplay.innerHTML = `${randomLat}, ${randomLng}`;

            mapDiv.style.display = 'block';
            setTimeout(() => {
                initMap(randomLat, randomLng);
            }, 300);
        }

        let map;
        function initMap(lat, long) {
            if (map) { map.remove(); }

            map = L.map('map').setView([lat, long], 14);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            var redIcon = new L.Icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41],
                popupAnchor: [1, -34],
                shadowSize: [41, 41]
            });

            L.marker([lat, long], {icon: redIcon}).addTo(map)
                .bindPopup(`<b>Lokasi Terdeteksi</b><br>Lat: ${lat}<br>Long: ${long}`)
                .openPopup();
        }
    </script>
</body>
  </html>
